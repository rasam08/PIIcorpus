name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install development requirements
        run: |
          python -m pip install --requirement requirements-dev.lock
          python -m pip install --no-deps --no-build-isolation -e .
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy src
      - name: Test
        run: pytest

  package:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Build distributions
        run: |
          python -m pip install --requirement requirements-dev.lock
          python -m build --no-isolation
      - name: Test installed wheel
        run: |
          python -m venv .wheel-venv
          .wheel-venv/bin/python -m pip install dist/*.whl
          .wheel-venv/bin/piicorpus generate --config configs/demo.toml --out .wheel-demo
          .wheel-venv/bin/piicorpus validate .wheel-demo --strict
          .wheel-venv/bin/piicorpus audit .wheel-demo --format json
          .wheel-venv/bin/piicorpus export .wheel-demo --format presidio
